            letter-spacing: 2px;

        }
        .question {
            font-size: 1.6rem;
            margin-bottom: 35px;
            font-weight: bold;
            color: #fff;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

            .options-grid { grid-template-columns: 1fr 1fr; }
        }
        @media(max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
        }

            background: #1a1c29;
            color: #e2e8f0;
            border: 2px solid #3b4261;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            text-align: center;
            transition: all 0.2s ease;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:hover {
            background: #ff007f;
            color: #fff;
            border-color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
        }
        .btn-center {
            grid-column: 1 / -1;
            max-width: 300px;
            margin: 20px auto 0 auto;
            width: 100%;
            padding: 18px;
            font-size: 1.3rem;
        }
        .btn-right {
            background: #00ffcc;
            color: #000;
            border-color: #00ffcc;
        }
        .btn-right:hover {
            background: #00ccaa;
            color: #000;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.7);
        }
        .btn-wrong {
            background: #ff3333;

            border-color: #ff3333;
        }
        .btn-wrong:hover {
            background: #cc2222;

            font-size: 3.8rem;
            color: #00ffcc;
            margin: 30px 0;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.5);

let activePool = [];
let currentQuestionIndex = 0;
let gameScores = {};

function startGame() {
    activePool = [...gamesDatabase];
    currentQuestionIndex = 0;
    gameScores = {};
    gamesDatabase.forEach(g => gameScores[g.name] = 0);
    showQuestion();
}

function showQuestion() {
    const card = document.getElementById('game-card');
    
    if (currentQuestionIndex >= questions.length || activePool.length <= 1) {
        showResult();
        return;
    }

    const qData = questions[currentQuestionIndex];
    let optionsHtml = '';
    
    qData.options.forEach(opt => {
        optionsHtml += `<button onclick="submitAnswer('${opt.tag}')">${opt.text}</button>`;
    });

    card.innerHTML = `
        <div class="progress">Question ${currentQuestionIndex + 1} of ${questions.length}</div>
        <div class="question">${qData.q}</div>
        <div class="options-grid">
            ${optionsHtml}
        </div>
        <div class="tracker">Isolating target matrix... candidates left: ${activePool.length}</div>
    `;
}

function submitAnswer(chosenTag) {
    activePool.forEach(game => {
        if (game.tags.includes(chosenTag)) {
            gameScores[game.name] += 25;
        }
    });

    let filtered = activePool.filter(game => game.tags.includes(chosenTag));
    if (filtered.length > 0) {
        activePool = filtered;
    }

    currentQuestionIndex++;
    showQuestion();
}

function showResult() {
    const card = document.getElementById('game-card');
    
    let highestScore = -1;
    let guessedGame = "";

    activePool.forEach(game => {
        if (gameScores[game.name] > highestScore) {
            highestScore = gameScores[game.name];
            guessedGame = game.name;
        }
    });

    if (!guessedGame) {
        guessedGame = gamesDatabase[Math.floor(Math.random() * gamesDatabase.length)].name;
    }

    card.innerHTML = `
        <h1>Matrix Scan Complete</h1>
        <p style="font-size: 1.5rem; margin-top: 25px;">I think your favorite game is:</p>
        <div class="game-display">${guessedGame}</div>
        <p style="font-size: 1.6rem; margin-bottom: 35px; font-weight: bold; text-transform: uppercase; color: #ff007f;">Am I right?</p>
        <div class="options-grid" style="grid-template-columns: 1fr 1fr; max-width: 500px; margin: 0 auto;">
            <button class="btn-right" onclick="handleFeedback(true)">✔️ Yep, nailed it!</button>
            <button class="btn-wrong" onclick="handleFeedback(false)">❌ Wrong, try again</button>
        </div>
    `;
}

function handleFeedback(isCorrect) {
    const card = document.getElementById('game-card');
    if (isCorrect) {
        card.innerHTML = `
            <h1 style="color: #00ffcc;">GG WP!</h1>
            <p style="font-size: 1.4rem; margin: 35px 0;">The oracle successfully isolated your exact gaming profile layout.</p>
            <button class="btn-center" onclick="startGame()">Play Again</button>
        `;
    } else {
        card.innerHTML = `
            <h1 style="color: #ff3333;">F in Chat</h1>
            <p style="font-size: 1.4rem; margin: 35px 0;">Algorithm recalibration needed. Let's trace your profile path again.</p>
            <button class="btn-center" onclick="startGame()">Reboot Matrix</button>
        `;
    }
}
